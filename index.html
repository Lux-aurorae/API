<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOONA TIMES</title>

    <!-- 부트스트랩 (그리드용) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- 아이콘 (햄버거, 돋보기) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- ★ 고급 신문 느낌의 서체: 제호/헤드라인용 세리프 + 본문용 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="api.css" />
  </head>
  <body>
    <!-- ================= 사이드 메뉴 (잉크색 서랍) ================= -->
    <div class="side-menu" id="mySidenav">
      <button class="closebtn" onclick="closeNav()">&times;</button>
      <p class="side-menu-label">Sections</p>
      <div class="side-menu-list" id="menu-list">
        <button>Sport</button>
        <button>Tech</button>
        <button>World</button>
        <button>Finance</button>
        <button>Politics</button>
        <button>Business</button>
        <button>Economics</button>
        <button>Entertainment</button>
        <button>Beauty</button>
        <button>Travel</button>
        <button>Music</button>
        <button>Food</button>
        <button>Science</button>
        <button>Gaming</button>
        <button>Energy</button>
      </div>
    </div>

    <!-- ================= 상단 유틸 바 ================= -->
    <nav class="top-bar">
      <i class="fas fa-bars icon-button" onclick="openNav()" title="메뉴"></i>

      <span class="top-bar-date" id="today-date"></span>

      <span class="search-wrap">
        <span id="input-area">
          <input type="text" id="search-input" placeholder="Search stories…" />
          <button class="search-button" onclick="searchNews()">Go</button>
        </span>
        <i class="fas fa-search icon-button" onclick="openSearchBox()" title="검색"></i>
      </span>
    </nav>

    <!-- ================= 제호 (Masthead) ================= -->
    <header class="masthead">
      <h1 class="masthead-title">Noona Times</h1>
      <p class="masthead-slogan">All the Code That’s Fit to Print</p>
      <div class="masthead-rule"></div>
    </header>

    <!-- ================= 뉴스 보드 ================= -->
    <main class="container news-container">
      <section id="news-board">
        <!-- JS render()가 여기에 기사를 그림 -->
      </section>
    </main>

    <footer class="site-footer">
      <div class="masthead-rule"></div>
      <p>© Noona Times — a JavaScript learning project</p>
    </footer>

    <!-- ★ moment.js: 날짜를 "3시간 전"처럼 표현해주는 라이브러리
         with-locales 버전이어야 한국어("n시간 전")가 나옵니다! -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment-with-locales.min.js"></script>
    <!-- ★ moment-timezone: 서울 시간(Asia/Seoul) 변환용 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>
    <script src="api.js"></script>
  </body>
</html>
