<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lux TIMES</title>

    <!-- ★ Bootswatch LUX 테마: 부트스트랩의 '럭셔리' 버전
         (기존 bootstrap.min.css 대신 이 한 줄로 교체하면 테마가 바뀝니다!) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- 아이콘 (돋보기 등) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="api.css" />
  </head>
  <body>
    <!-- =====================================================
         ★ 헤더: Lux 스타일 네비게이션 바
         - 데스크톱: 카테고리가 가로로 쭉
         - 모바일: 자동으로 햄버거(☰)로 접힘 (부트스트랩 collapse 기능)
         ===================================================== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container">
        <!-- 브랜드(제호): 클릭하면 최신 뉴스로 -->
        <a class="navbar-brand" href="#" onclick="getLatestNews()">Noona&nbsp;Times</a>

        <!-- 모바일 햄버거 버튼 (부트스트랩이 자동으로 열고 닫아줌) -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- 접히는 영역: 카테고리 메뉴 + 검색창 -->
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav me-auto" id="menu-list">
            <!-- API 문서의 7개 카테고리 그대로 -->
            <li><button class="nav-link">business</button></li>
            <li><button class="nav-link">entertainment</button></li>
            <li><button class="nav-link">general</button></li>
            <li><button class="nav-link">health</button></li>
            <li><button class="nav-link">science</button></li>
            <li><button class="nav-link">technology</button></li>
            <li><button class="nav-link">sports</button></li>
          </ul>

          <!-- 검색창: 항상 보이게 (숨김 토글보다 접근이 빠른 UX) -->
          <div class="d-flex search-area">
            <input
              type="search"
              id="search-input"
              class="form-control"
              placeholder="Search"
            />
            <button class="btn btn-primary" onclick="searchNews()">
              <i class="fas fa-search"></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- =====================================================
         본문: 상태 표시줄 + 뉴스 + 페이지네이션
         ===================================================== -->
    <main class="container news-container">
      <!-- 지금 무엇을 보고 있는지 알려주는 줄 (UX!) -->
      <p class="status-line" id="status-line"></p>

      <section id="news-board"></section>

      <!-- ★ 페이지네이션: JS가 여기에 페이지 버튼을 그림 -->
      <nav aria-label="Page navigation">
        <ul class="pagination justify-content-center" id="pagination"></ul>
      </nav>
    </main>

    <footer class="site-footer">
      <p>NOONA TIMES — a JavaScript learning project</p>
    </footer>

    <!-- ★ 부트스트랩 JS: 모바일 햄버거(collapse)가 작동하려면 필수! -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api.js"></script>
  </body>
</html>
