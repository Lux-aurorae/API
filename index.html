<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noona Times</title>

    <!-- 부트스트랩 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- ★ 햄버거/돋보기 아이콘용 Font Awesome (fa-bars, fa-search가 이거 없으면 안 보여요!) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- ★ 수정: rel="style/sheets" → rel="stylesheet" (오타면 CSS가 통째로 무시됨!) -->
    <link rel="stylesheet" href="api.css" />
  </head>
  <body>
    <!-- ★ 추가: 사이드 메뉴 (평소엔 너비 0이라 안 보임) -->
    <div class="side-menu" id="mySidenav">
      <button class="closebtn" onclick="closeNav()">&times;</button>
      <div class="side-menu-list" id="menu-list">
        <button>Sport</button>
        <button>Tech</button>
        <button>World</button>
        <button>Finance</button>
        <button>Politics</button>
        <button>Business</button>
        <button>Economics</button>
        <button>Entertainment</button>
        <button>Beauty</button>
        <button>Travel</button>
        <button>Music</button>
        <button>Food</button>
        <button>Science</button>
        <button>Gaming</button>
        <button>Energy</button>
      </div>
    </div>

    <section class="container">
      <section>
        <!-- ★ 추가: 햄버거 버튼(메뉴 열기) + 검색 아이콘/검색창 -->
        <div class="top-bar">
          <i class="fas fa-bars icon-button" onclick="openNav()"></i>

          <i class="fas fa-search icon-button" onclick="openSearchBox()"></i>
          <span id="input-area">
            <input type="text" id="search-input" placeholder="search" />
            <button class="search-button" onclick="searchNews()">Go</button>
          </span>
        </div>

        <div class="head-line">
          <!-- 기존 Noona Times SVG 로고는 그대로 두시면 됩니다 -->
          <svg viewBox="0 0 500 60"><!-- ...기존 SVG 내용 그대로... --></svg>
        </div>
      </section>

      <!-- 뉴스가 JS의 render()로 그려지는 곳 -->
      <section id="news-board"></section>
      <!-- ★ 정리: 안에 있던 예시 카드(수동 HTML)는 삭제!
           render()가 innerHTML로 통째로 갈아끼우기 때문에 어차피 지워져요 -->
    </section>

    <script src="api.js"></script>
  </body>
</html>
