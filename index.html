<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Korea Times</title>

    <!-- 부트스트랩 (그리드/페이지네이션/알림 박스용) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- 🗞️ NYT 무드 서체: 클래식 세리프 제호 + 세리프 헤드라인 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="api.css" />
  </head>
  <body>
    <!-- ========== ① 최상단 유틸 바: 날짜 · 검색 ========== -->
    <div class="utility-bar">
      <span class="utility-date" id="today-date"></span>
      <div class="search-area">
        <input type="search" id="search-input" placeholder="SEARCH" />
        <button class="search-go" onclick="searchNews()">
          <i class="fas fa-search"></i>
        </button>
      </div>
    </div>

    <!-- ========== ② 제호: 클릭하면 전체(최신) 뉴스로 ==========
         ★ 제호 클릭 → getLatestNews() → 1페이지부터 표시되고,
           하단 페이지네이션의 ≫ 로 언제든 '마지막 페이지'까지 이동 가능! -->
    <header class="masthead">
      <h1 class="masthead-title" onclick="getLatestNews()" title="최신 뉴스로">
        The Korea Times
      </h1>
    </header>

    <!-- ========== ③ 섹션 내비: 위아래 괘선 사이 카테고리 ========== -->
    <nav class="section-nav" id="menu-list">
      <button>business</button>
      <button>entertainment</button>
      <button>general</button>
      <button>health</button>
      <button>science</button>
      <button>technology</button>
      <button>sports</button>
    </nav>

    <!-- ========== ④ 본문 ========== -->
    <main class="container news-container">
      <p class="status-line" id="status-line"></p>
      <section id="news-board"></section>

      <!-- 페이지네이션: ≪ ‹ 1 2 3 4 5 › ≫ (JS가 그림) -->
      <nav aria-label="Page navigation">
        <ul class="pagination justify-content-center" id="pagination"></ul>
      </nav>
    </main>

    <footer class="site-footer">
      <p>The Korea Times — a JavaScript learning project</p>
      <p class="footer-credit">보도국장 <b>Noona</b> · Written by <b>donghui</b></p>
    </footer>

    <script src="api.js"></script>
  </body>
</html>
